name: image_tool
description: 简洁高效的跨平台图片处理工具
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  file_picker: ^6.1.1
  image: ^4.1.3
  path: ^1.8.3
  path_provider: ^2.1.1
  crypto: ^3.0.3
  ffi: ^2.1.0
  flutter_rust_bridge: ^2.0.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  ffigen: ^11.0.0

flutter:
  uses-material-design: true
