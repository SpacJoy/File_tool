name: image_tool
description: 图片批量处理工具 - 支持去重、格式转换、分类整理、批量重命名
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  image: ^4.1.3
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  path: ^1.8.3
  crypto: ^3.0.3
  uuid: ^4.2.1
  intl: ^0.19.0
  async: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
